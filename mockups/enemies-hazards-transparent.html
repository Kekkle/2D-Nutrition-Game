<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriRun — Enemies & Hazards (Transparent)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #fff;
    background-image:
      linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
      linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
      linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    font-family: 'Courier New', monospace;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    image-rendering: pixelated;
  }
  h1 {
    font-size: 14px;
    color: #333;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.85);
    padding: 4px 12px;
    border-radius: 3px;
  }
  .section-label {
    font-size: 10px;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 30px;
    margin-bottom: 16px;
    background: rgba(255,255,255,0.85);
    padding: 3px 10px;
    border-radius: 3px;
  }
  .sprite-row {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: center;
    align-items: center;
  }
  .sprite-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
  }
  .sprite-label {
    font-size: 8px;
    color: #555;
    text-align: center;
    margin-top: 4px;
    background: rgba(255,255,255,0.7);
    padding: 1px 4px;
    border-radius: 2px;
  }
  .sprite-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ============================================================ */
  /* STYLE A: BOLD OUTLINED — Enemies                              */
  /* ============================================================ */

  /* Fatigue Phantom */
  .sa-phantom {
    position: relative;
    width: 48px;
    height: 56px;
  }
  .sa-phantom-body {
    width: 48px;
    height: 40px;
    background: #8866aa;
    border: 3px solid #4a3460;
    border-radius: 50% 50% 0 0;
    position: relative;
  }
  .sa-phantom-eye {
    position: absolute;
    width: 10px;
    height: 3px;
    background: #4a3460;
    border: none;
    border-radius: 1px;
    top: 18px;
  }
  .sa-phantom-eye.l { left: 7px; }
  .sa-phantom-eye.r { right: 7px; }
  .sa-phantom-pupil { display: none; }
  .sa-phantom-mouth {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 2px;
    background: #4a3460;
    border: none;
    border-radius: 1px;
  }
  .sa-phantom-tail {
    display: flex;
    gap: 0;
  }
  .sa-phantom-wisp {
    width: 12px;
    height: 16px;
    background: #8866aa;
    border-left: 3px solid #4a3460;
    border-right: 3px solid #4a3460;
    border-bottom: 3px solid #4a3460;
    border-radius: 0 0 50% 50%;
  }
  .sa-phantom-wisp:first-child { border-left: 3px solid #4a3460; }

  /* Stress Sprite */
  .sa-sprite {
    position: relative;
    width: 32px;
    height: 32px;
  }
  .sa-sprite-body {
    width: 32px;
    height: 32px;
    background: #44aaee;
    border: 3px solid #1a6090;
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 0 3px #44aaee44;
  }
  .sa-sprite-eye {
    position: absolute;
    width: 7px;
    height: 8px;
    background: #fff;
    border: 2px solid #1a6090;
    border-radius: 50%;
    top: 8px;
  }
  .sa-sprite-eye.l { left: 4px; }
  .sa-sprite-eye.r { right: 4px; }
  .sa-sprite-zap {
    position: absolute;
    width: 10px;
    height: 14px;
    background: #fff;
    border: 1px solid #1a6090;
    clip-path: polygon(50% 0, 100% 40%, 60% 40%, 80% 100%, 0 50%, 40% 50%);
  }
  .sa-sprite-zap.z1 { top: -10px; left: 2px; }
  .sa-sprite-zap.z2 { top: -8px; right: -2px; transform: rotate(30deg); }
  .sa-sprite-zap.z3 { bottom: -6px; right: 2px; transform: rotate(-20deg); }

  /* Free Radical */
  .sa-radical {
    position: relative;
    width: 38px;
    height: 38px;
  }
  .sa-radical-body {
    width: 28px;
    height: 28px;
    background: #aaee44;
    border: 3px solid #5a8020;
    border-radius: 50%;
    position: relative;
    margin: 5px auto 0;
  }
  .sa-radical-eye {
    position: absolute;
    width: 8px;
    height: 5px;
    background: #5a8020;
    border-radius: 0;
    top: 8px;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
  }
  .sa-radical-eye.l { left: 4px; }
  .sa-radical-eye.r { right: 4px; }
  .sa-radical-spike {
    position: absolute;
    width: 12px;
    height: 14px;
    background: #aaee44;
    border: none;
    border-radius: 0;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    filter: drop-shadow(0 0 1.5px #5a8020) drop-shadow(0 0 1.5px #5a8020);
  }
  .sa-radical-spike.s1 { top: -8px; left: 50%; transform: translateX(-50%); }
  .sa-radical-spike.s2 { top: 0; right: -6px; transform: rotate(60deg); }
  .sa-radical-spike.s3 { bottom: 0; right: -6px; transform: rotate(120deg); }
  .sa-radical-spike.s4 { bottom: -8px; left: 50%; transform: translateX(-50%) rotate(180deg); }
  .sa-radical-spike.s5 { bottom: 0; left: -6px; transform: rotate(-120deg); }
  .sa-radical-spike.s6 { top: 0; left: -6px; transform: rotate(-60deg); }

  /* Entropy Blob */
  .sa-blob {
    position: relative;
    width: 58px;
    height: 44px;
  }
  .sa-blob-body {
    width: 58px;
    height: 44px;
    background: #554466;
    border: 3px solid #2a2030;
    border-radius: 50%;
    position: relative;
  }
  .sa-blob-eye {
    position: absolute;
    width: 8px;
    height: 6px;
    background: #aa88cc;
    border: 2px solid #2a2030;
    border-radius: 50%;
    top: 16px;
  }
  .sa-blob-eye.l { left: 14px; }
  .sa-blob-eye.r { right: 14px; }
  .sa-blob-drip { display: none; }

  /* Sedentary Slime */
  .sa-slime {
    position: relative;
    width: 36px;
    height: 36px;
  }
  .sa-slime-body {
    width: 36px;
    height: 36px;
    background: #88aa44;
    border: 3px solid #4a5c20;
    border-radius: 4px;
    position: relative;
  }
  .sa-slime-eye {
    position: absolute;
    width: 8px;
    height: 6px;
    background: #fff;
    border: 2px solid #4a5c20;
    border-radius: 50%;
    top: 10px;
  }
  .sa-slime-eye.l { left: 6px; }
  .sa-slime-eye.r { right: 6px; }
  .sa-slime-puddle { display: none; }

  /* Brain Fog Wisp */
  .sa-wisp {
    position: relative;
    width: 44px;
    height: 36px;
  }
  .sa-wisp-body {
    width: 36px;
    height: 28px;
    background: #9999bb;
    border: 3px solid #555570;
    border-radius: 50%;
    position: relative;
    margin: 0 auto;
  }
  .sa-wisp-eye {
    position: absolute;
    width: 7px;
    height: 5px;
    background: #ddd;
    border: 2px solid #555570;
    border-radius: 50%;
    top: 10px;
  }
  .sa-wisp-eye.l { left: 5px; }
  .sa-wisp-eye.r { right: 5px; }
  .sa-wisp-trail {
    width: 8px;
    height: 8px;
    background: #9999bb;
    border: 2px solid #555570;
    border-radius: 50%;
    position: absolute;
    bottom: -2px;
    filter: blur(2px);
  }
  .sa-wisp-trail.t1 { left: -2px; width: 10px; height: 10px; }
  .sa-wisp-trail.t2 { right: -4px; width: 12px; height: 12px; bottom: 2px; }
  .sa-wisp-fog {
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: #9999bb;
    border: 2px solid #555570;
    border-radius: 50%;
    opacity: 0.6;
    filter: blur(2px);
  }

  /* ============================================================ */
  /* STYLE A: BOLD OUTLINED — Hazards                              */
  /* ============================================================ */

  /* Soda Geyser */
  .sa-geyser {
    position: relative;
    width: 36px;
    height: 52px;
  }
  .sa-geyser-base {
    width: 36px;
    height: 20px;
    background: #cc4444;
    border: 3px solid #6a2020;
    border-radius: 4px 4px 8px 8px;
    position: absolute;
    bottom: 0;
  }
  .sa-geyser-label {
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 6px;
    background: #fff;
    border: 1px solid #6a2020;
    border-radius: 2px;
  }
  .sa-geyser-spray {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
  }
  .sa-geyser-drop {
    width: 6px;
    height: 8px;
    background: #ee8844;
    border: 2px solid #804420;
    border-radius: 50%;
    position: absolute;
  }
  .sa-geyser-drop.d1 { bottom: 0; left: 0; }
  .sa-geyser-drop.d2 { bottom: 8px; left: -6px; width: 5px; height: 6px; }
  .sa-geyser-drop.d3 { bottom: 12px; left: 4px; width: 5px; height: 7px; }
  .sa-geyser-drop.d4 { bottom: 20px; left: -2px; width: 4px; height: 5px; }

  /* Crash Pit */
  .sa-crashpit {
    position: relative;
    width: 60px;
    height: 20px;
  }
  .sa-crashpit-body {
    width: 60px;
    height: 14px;
    background: repeating-linear-gradient(90deg, #8a6a30 0px, #8a6a30 5px, #6a5020 5px, #6a5020 10px);
    border: 3px solid #3a2a10;
    border-radius: 3px;
    position: relative;
  }
  .sa-crashpit-wave {
    position: absolute;
    top: -8px;
    left: 4px;
    font-size: 10px;
    color: #aa8840;
    letter-spacing: 2px;
  }

  /* Fog Bank */
  .sa-fogbank {
    position: relative;
    width: 56px;
    height: 40px;
  }
  .sa-fog-puff {
    position: absolute;
    background: #aaaacc;
    border: 3px solid #555568;
    border-radius: 50%;
    filter: blur(2px);
  }
  .sa-fog-puff.f1 { width: 28px; height: 22px; bottom: 0; left: 0; }
  .sa-fog-puff.f2 { width: 32px; height: 24px; bottom: 4px; right: 0; }
  .sa-fog-puff.f3 { width: 24px; height: 18px; top: 0; left: 12px; }

  /* Inflammation Zone */
  .sa-inflam {
    position: relative;
    width: 52px;
    height: 36px;
  }
  .sa-inflam-body {
    width: 52px;
    height: 28px;
    background: #dd4444;
    border: 3px solid #7a2020;
    border-radius: 8px;
    position: relative;
    box-shadow: 0 0 0 4px #dd444433;
  }
  .sa-inflam-pulse {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 16px;
    height: 16px;
    background: #ff8844;
    border: 2px solid #804420;
    border-radius: 50%;
  }
  .sa-inflam-pulse::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 6px;
    height: 6px;
    background: #ffcc44;
    border: 1px solid #806820;
    border-radius: 50%;
  }
  .sa-inflam-wave {
    position: absolute;
    bottom: -6px;
    left: 4px;
    right: 4px;
    height: 4px;
    background: #dd4444;
    border: 2px solid #7a2020;
    border-radius: 0 0 4px 4px;
    border-top: none;
    opacity: 0.5;
  }

  /* Misleading Labels */
  .sa-mislead {
    position: relative;
    width: 32px;
    height: 38px;
  }
  .sa-mislead-body {
    width: 32px;
    height: 32px;
    background: #55aa55;
    border: 3px solid #2a5a2a;
    border-radius: 4px;
    position: relative;
  }
  .sa-mislead-check {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: #fff;
    text-shadow: 1px 1px 0 #2a5a2a;
  }
  .sa-mislead-x {
    position: absolute;
    bottom: -4px;
    right: -4px;
    width: 14px;
    height: 14px;
    background: #dd4444;
    border: 2px solid #7a2020;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: bold;
    color: #fff;
  }
  .sa-mislead-lines {
    position: absolute;
    bottom: 4px;
    left: 5px;
    right: 5px;
    height: 2px;
    background: #fff;
    border-radius: 1px;
    box-shadow: 0 -4px 0 #fff;
  }
</style>
</head>
<body>

<h1>Enemies & Hazards — Style A (Transparent)</h1>

<div class="section-label">Enemies</div>
<div class="sprite-row">
  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-phantom">
        <div class="sa-phantom-body">
          <div class="sa-phantom-eye l"><div class="sa-phantom-pupil"></div></div>
          <div class="sa-phantom-eye r"><div class="sa-phantom-pupil"></div></div>
          <div class="sa-phantom-mouth"></div>
        </div>
        <div class="sa-phantom-tail">
          <div class="sa-phantom-wisp"></div>
          <div class="sa-phantom-wisp"></div>
          <div class="sa-phantom-wisp"></div>
          <div class="sa-phantom-wisp"></div>
        </div>
      </div>
    </div>
    <div class="sprite-label">Fatigue Phantom</div>
  </div>

  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-sprite">
        <div class="sa-sprite-body">
          <div class="sa-sprite-eye l"></div>
          <div class="sa-sprite-eye r"></div>
        </div>
        <div class="sa-sprite-zap z1">⚡</div>
        <div class="sa-sprite-zap z2">⚡</div>
        <div class="sa-sprite-zap z3">⚡</div>
      </div>
    </div>
    <div class="sprite-label">Stress Sprite</div>
  </div>

  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-radical">
        <div class="sa-radical-spike s1"></div>
        <div class="sa-radical-spike s2"></div>
        <div class="sa-radical-spike s3"></div>
        <div class="sa-radical-spike s4"></div>
        <div class="sa-radical-spike s5"></div>
        <div class="sa-radical-spike s6"></div>
        <div class="sa-radical-body">
          <div class="sa-radical-eye l"></div>
          <div class="sa-radical-eye r"></div>
        </div>
      </div>
    </div>
    <div class="sprite-label">Free Radical</div>
  </div>

  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-blob">
        <div class="sa-blob-body">
          <div class="sa-blob-eye l"></div>
          <div class="sa-blob-eye r"></div>
        </div>
      </div>
    </div>
    <div class="sprite-label">Entropy Blob</div>
  </div>

  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-slime">
        <div class="sa-slime-body">
          <div class="sa-slime-eye l"></div>
          <div class="sa-slime-eye r"></div>
        </div>
      </div>
    </div>
    <div class="sprite-label">Sedentary Slime</div>
  </div>

  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-wisp">
        <div class="sa-wisp-trail t1"></div>
        <div class="sa-wisp-trail t2"></div>
        <div class="sa-wisp-body">
          <div class="sa-wisp-eye l"></div>
          <div class="sa-wisp-eye r"></div>
        </div>
        <div class="sa-wisp-fog"></div>
      </div>
    </div>
    <div class="sprite-label">Brain Fog Wisp</div>
  </div>
</div>

<div class="section-label">Hazards</div>
<div class="sprite-row">
  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-geyser">
        <div class="sa-geyser-base"><div class="sa-geyser-label"></div></div>
        <div class="sa-geyser-spray">
          <div class="sa-geyser-drop d1"></div>
          <div class="sa-geyser-drop d2"></div>
          <div class="sa-geyser-drop d3"></div>
          <div class="sa-geyser-drop d4"></div>
        </div>
      </div>
    </div>
    <div class="sprite-label">Soda Geyser</div>
  </div>

  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-crashpit">
        <div class="sa-crashpit-wave">~ ~ ~</div>
        <div class="sa-crashpit-body"></div>
      </div>
    </div>
    <div class="sprite-label">Crash Pit</div>
  </div>

  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-fogbank">
        <div class="sa-fog-puff f1"></div>
        <div class="sa-fog-puff f2"></div>
        <div class="sa-fog-puff f3"></div>
      </div>
    </div>
    <div class="sprite-label">Fog Bank</div>
  </div>

  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-inflam">
        <div class="sa-inflam-body">
          <div class="sa-inflam-pulse"></div>
        </div>
        <div class="sa-inflam-wave"></div>
      </div>
    </div>
    <div class="sprite-label">Inflammation Zone</div>
  </div>

  <div class="sprite-wrap">
    <div class="sprite-cell">
      <div class="sa-mislead">
        <div class="sa-mislead-body">
          <div class="sa-mislead-check">✓</div>
          <div class="sa-mislead-lines"></div>
        </div>
        <div class="sa-mislead-x">✕</div>
      </div>
    </div>
    <div class="sprite-label">Misleading Label</div>
  </div>
</div>

</body>
</html>
