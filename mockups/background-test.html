<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriRun — Background Test (SVG)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    padding: 20px;
  }
  h1 {
    font-size: 18px;
    color: #f0c040;
    margin-bottom: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 20px;
  }
  .game-frame {
    width: 960px;
    height: 540px;
    border: 4px solid #f0c040;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #3a7ecf 0%, #5fa8d3 40%, #5fa8d3 40%, #5fa8d3 100%);
  }
  .bg-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* Pixelated ground layers */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    image-rendering: pixelated;
  }
  .ground-grass {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 20px;
    background: repeating-linear-gradient(
      90deg,
      #3a9e28 0px, #3a9e28 8px,
      #2e8a20 8px, #2e8a20 16px
    );
    background-size: 16px 20px;
  }
  .ground-grass::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: repeating-linear-gradient(
      90deg,
      #48b830 0px, #48b830 8px,
      #3aa828 8px, #3aa828 16px
    );
  }
  .ground-dirt {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    bottom: 0;
    background: #a0581c;
    background-image:
      repeating-linear-gradient(
        90deg,
        rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 8px,
        transparent 8px, transparent 16px
      ),
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 8px,
        transparent 8px, transparent 16px
      );
  }
  .ground-dirt::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 12px;
    background: #8a4818;
    background-image:
      repeating-linear-gradient(
        90deg,
        rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 8px,
        transparent 8px, transparent 16px
      );
  }

  /* HUD — Top bar */
  .hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: linear-gradient(180deg, #000000cc 0%, #00000066 80%, transparent 100%);
    display: flex;
    align-items: flex-start;
    padding: 8px 16px;
    gap: 20px;
    z-index: 10;
  }
  .hud-section {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .hud-label {
    font-size: 9px;
    color: #f0c040;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .energy-bar-bg {
    width: 200px;
    height: 14px;
    background: #333;
    border: 2px solid #f0c040;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .energy-bar-fill {
    height: 100%;
    width: 72%;
    background: linear-gradient(90deg, #40cc60, #80ee40);
    border-radius: 1px;
    position: relative;
  }
  .energy-bar-fill::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 2px;
    right: 4px;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 1px;
  }
  .collection-bar-bg {
    width: 180px;
    height: 14px;
    background: #333;
    border: 2px solid #e8b84c;
    border-radius: 2px;
    overflow: hidden;
  }
  .collection-bar-fill {
    height: 100%;
    width: 45%;
    background: linear-gradient(90deg, #e8b84c, #f0d040);
    border-radius: 1px;
    position: relative;
  }
  .collection-bar-fill::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 2px;
    right: 4px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 1px;
  }
  .fibre-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .fibre-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid #3a8a2a;
  }
  .fibre-dot.found { background: #3a8a2a; }
  .fibre-dot.empty { background: #333; }
  .cell-counter {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .cell-icon {
    width: 12px;
    height: 12px;
    background: radial-gradient(circle at 40% 35%, #80ffcc, #20cc88);
    border: 1px solid #10aa66;
    border-radius: 50%;
  }
  .cell-count {
    font-size: 14px;
    color: #80ffcc;
    font-weight: bold;
  }
  .stars-display {
    display: flex;
    gap: 4px;
  }
  .star {
    font-size: 14px;
    color: #f0c040;
    text-shadow: 0 0 4px #f0c04066;
  }
  .star.empty { color: #555; text-shadow: none; }
  .level-name {
    font-size: 10px;
    color: #f0c040;
    letter-spacing: 2px;
    position: absolute;
    top: 10px;
    right: 16px;
  }
</style>
</head>
<body>
  <h1>Background Test — SVG Approach</h1>
  <p class="subtitle">Matching Canva reference — hills, clouds, sun, pixelated ground</p>

  <div class="game-frame">
    <svg class="bg-svg" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">

      <!-- ========== HILLS — light pastel green, smooth slopes ========== -->

      <!-- Hill 1 — medium, left side -->
      <ellipse cx="160" cy="420" rx="220" ry="140" fill="#6abf48"/>

      <!-- Hill 2 — smaller, center -->
      <ellipse cx="500" cy="420" rx="170" ry="105" fill="#7acc58"/>

      <!-- Hill 3 — largest, right side, extends off edge -->
      <ellipse cx="800" cy="420" rx="280" ry="190" fill="#6ec44c"/>

      <!-- ========== CLOUDS — original style ========== -->

      <!-- Cloud 1 -->
      <ellipse cx="130" cy="55" rx="40" ry="15" fill="white"/>
      <ellipse cx="120" cy="43" rx="20" ry="12.5" fill="white"/>
      <ellipse cx="145" cy="47" rx="25" ry="10" fill="white"/>

      <!-- Cloud 2 -->
      <ellipse cx="530" cy="81" rx="30" ry="11" fill="white"/>
      <ellipse cx="518" cy="71" rx="17.5" ry="9" fill="white"/>
      <ellipse cx="540" cy="75" rx="20" ry="8" fill="white"/>

      <!-- Cloud 3 -->
      <ellipse cx="785" cy="43" rx="35" ry="13" fill="white"/>
      <ellipse cx="774" cy="33" rx="19" ry="10" fill="white"/>
      <ellipse cx="797" cy="36" rx="22.5" ry="9" fill="white"/>

      <!-- ========== SUN — kawaii style with face ========== -->
      <g transform="translate(780, 55)">
        <!-- Rays -->
        <line x1="0" y1="-30" x2="0" y2="-22" stroke="#f0a020" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="21" y1="-21" x2="15" y2="-15" stroke="#f0a020" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="30" y1="0" x2="22" y2="0" stroke="#f0a020" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="21" y1="21" x2="15" y2="15" stroke="#f0a020" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="0" y1="30" x2="0" y2="22" stroke="#f0a020" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="-21" y1="21" x2="-15" y2="15" stroke="#f0a020" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="-30" y1="0" x2="-22" y2="0" stroke="#f0a020" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="-21" y1="-21" x2="-15" y2="-15" stroke="#f0a020" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Sun body -->
        <circle cx="0" cy="0" r="18" fill="#f0c040"/>
        <!-- Eyes -->
        <circle cx="-6" cy="-2" r="2.5" fill="#333"/>
        <circle cx="6" cy="-2" r="2.5" fill="#333"/>
        <!-- Smile -->
        <path d="M -5 4 Q 0 9, 5 4" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Blush -->
        <ellipse cx="-11" cy="4" rx="4" ry="2.5" fill="#f0a060" opacity="0.5"/>
        <ellipse cx="11" cy="4" rx="4" ry="2.5" fill="#f0a060" opacity="0.5"/>
      </g>

    </svg>

    <!-- Ground -->
    <div class="ground">
      <div class="ground-grass"></div>
      <div class="ground-dirt"></div>
    </div>

    <!-- HUD -->
    <div class="hud">
      <div class="hud-section">
        <div class="hud-label">Energy</div>
        <div class="energy-bar-bg">
          <div class="energy-bar-fill"></div>
        </div>
      </div>
      <div class="hud-section">
        <div class="hud-label">Carbs Collected</div>
        <div class="collection-bar-bg">
          <div class="collection-bar-fill"></div>
        </div>
        <div class="fibre-indicator">
          <span style="font-size: 8px; color: #80ff80;">Fibre:</span>
          <div class="fibre-dot found"></div>
          <div class="fibre-dot found"></div>
          <div class="fibre-dot empty"></div>
          <div class="fibre-dot empty"></div>
          <div class="fibre-dot empty"></div>
          <div class="fibre-dot empty"></div>
        </div>
      </div>
      <div class="hud-section">
        <div class="cell-counter">
          <div class="cell-icon"></div>
          <span class="cell-count">× 23</span>
        </div>
        <div class="stars-display">
          <span class="star">★</span>
          <span class="star empty">★</span>
          <span class="star empty">★</span>
        </div>
      </div>
      <div class="level-name">L1 — CARBOHYDRATES</div>
    </div>
  </div>
</body>
</html>
