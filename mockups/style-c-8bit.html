<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriRun — Style C: 8-Bit Pixel Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    padding: 20px;
    image-rendering: pixelated;
  }
  h1 {
    font-size: 18px;
    color: #fcbc18;
    margin-bottom: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 12px;
    color: #888;
    margin-bottom: 20px;
  }
  .game-frame {
    width: 768px;
    height: 480px;
    border: 4px solid #fcbc18;
    position: relative;
    overflow: hidden;
    image-rendering: pixelated;
    background: #5c94fc;
  }

  /* 8-bit uses flat color blocks, no gradients, hard edges, limited palette */
  /* NES-inspired palette: ~25 colors max */

  /* Sky — flat solid */
  /* already set by .game-frame background */

  /* Clouds — blocky rectangles */
  .cloud8 {
    position: absolute;
    background: #fcfcfc;
  }
  .c1 { width: 48px; height: 16px; top: 40px; left: 80px; }
  .c1a { width: 32px; height: 8px; top: 32px; left: 88px; }
  .c2 { width: 40px; height: 16px; top: 60px; left: 420px; }
  .c2a { width: 24px; height: 8px; top: 52px; left: 428px; }
  .c3 { width: 48px; height: 16px; top: 36px; left: 620px; }
  .c3a { width: 32px; height: 8px; top: 28px; left: 628px; }

  /* Hills — simple blocky triangles via stacked blocks */
  .hill8 {
    position: absolute;
    background: #00a800;
  }
  .h1 { width: 160px; height: 48px; bottom: 96px; left: -20px; border-radius: 0; }
  .h1t { width: 96px; height: 24px; bottom: 144px; left: 12px; }
  .h1tt { width: 32px; height: 16px; bottom: 168px; left: 44px; }
  .h2 { width: 120px; height: 40px; bottom: 96px; left: 340px; }
  .h2t { width: 64px; height: 20px; bottom: 136px; left: 368px; }
  .h2tt { width: 24px; height: 12px; bottom: 156px; left: 388px; }
  .h3 { width: 140px; height: 44px; bottom: 96px; left: 580px; }
  .h3t { width: 80px; height: 22px; bottom: 140px; left: 610px; }
  .h3tt { width: 28px; height: 14px; bottom: 162px; left: 636px; }

  /* Ground — two flat color bands */
  .ground8 {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: #00a800;
  }
  .ground8-dirt {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 32px;
    background: #c84c0c;
  }
  /* Ground detail blocks — repeating brick pattern */
  .brick-row {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 32px;
    background: repeating-linear-gradient(
      90deg,
      #c84c0c 0px, #c84c0c 14px,
      #a03800 14px, #a03800 16px
    );
  }
  .brick-row2 {
    position: absolute;
    bottom: 16px;
    left: 8px;
    right: 0;
    height: 16px;
    background: repeating-linear-gradient(
      90deg,
      #c84c0c 0px, #c84c0c 14px,
      #a03800 14px, #a03800 16px
    );
  }
  .ground8-top {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    height: 4px;
    background: #005800;
  }

  /* Platforms — solid brick blocks */
  .plat8 {
    position: absolute;
    height: 16px;
    background: #c84c0c;
    border-top: 4px solid #fcbc18;
    border-bottom: 2px solid #a03800;
  }
  .plat8::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 14px,
      #a03800 14px, #a03800 16px
    );
  }
  .p1 { width: 96px; bottom: 192px; left: 160px; }
  .p2 { width: 80px; bottom: 256px; left: 340px; }
  .p3 { width: 112px; bottom: 224px; left: 530px; }
  .p4 { width: 64px; bottom: 160px; left: 64px; }

  /* Question block */
  .qblock {
    position: absolute;
    width: 16px;
    height: 16px;
    background: #fcbc18;
    border: 2px solid #a03800;
  }
  .qblock::after {
    content: '?';
    position: absolute;
    top: -2px;
    left: 2px;
    font-size: 12px;
    font-weight: bold;
    color: #a03800;
    line-height: 16px;
  }

  /* Player character — strict 8-bit grid blocks */
  .player8 {
    position: absolute;
    bottom: 64px;
    left: 130px;
  }
  /* Build character from pixel rows */
  .px-row {
    display: flex;
    height: 4px;
  }
  .px {
    width: 4px;
    height: 4px;
  }
  .skin { background: #fcbc18; }
  .hair { background: #a03800; }
  .shirt { background: #0058f8; }
  .pants { background: #00008c; }
  .shoe { background: #a03800; }
  .eye { background: #000; }
  .mouth { background: #c84c0c; }
  .t { background: transparent; }

  /* Fatigue Phantom — 8-bit ghost */
  .ghost8 {
    position: absolute;
    bottom: 68px;
    left: 580px;
  }
  .gp { background: #8058a8; }
  .ge { background: #fcfcfc; }
  .gd { background: #000; }
  .gt { background: transparent; }

  /* Food items — tiny 8-bit sprites built from pixel blocks */
  .food8 {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .food8 .flabel {
    font-size: 7px;
    color: #fcfcfc;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .food8 .flabel.fibre {
    color: #00e800;
  }
  .sprite {
    display: flex;
    flex-direction: column;
  }
  .sp-row {
    display: flex;
    height: 3px;
  }
  .sp {
    width: 3px;
    height: 3px;
  }
  /* Bread colors */
  .bc { background: #fcbc18; }
  .bd { background: #c84c0c; }
  /* Brown bread */
  .bb { background: #885418; }
  .bs { background: #c89050; }
  /* Banana */
  .by { background: #fcfc00; }
  .bk { background: #c8a800; }
  /* Apple */
  .ar { background: #e40000; }
  .ag { background: #00a800; }
  .ab { background: #a03800; }
  /* Rice */
  .rw { background: #fcfcfc; }
  .rb { background: #d0c8a8; }
  /* Potato */
  .pb { background: #c8a060; }
  .pd { background: #a08040; }
  /* Oats */
  .ot { background: #d4b87a; }
  .od { background: #b89858; }
  /* Pasta */
  .py { background: #fcdc00; }
  .pk { background: #c8b000; }

  /* Energy Cells — 8-bit coins */
  .ecoin {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #00e800;
    border: 2px solid #008800;
  }

  /* Crash Pit */
  .cpit {
    position: absolute;
    bottom: 64px;
    height: 8px;
    background: repeating-linear-gradient(
      90deg,
      #886830 0px, #886830 6px,
      #685020 6px, #685020 8px
    );
    border-top: 2px solid #a8884c;
  }
  .cpit-warn {
    position: absolute;
    bottom: 72px;
    font-size: 8px;
    color: #a8884c;
    letter-spacing: 2px;
  }

  /* Fibre sparkle — simple 8-bit cross */
  .spark8 {
    position: absolute;
    font-size: 8px;
    color: #00e800;
  }

  /* HUD — solid blocks, NES style */
  .hud8 {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: #000;
    display: flex;
    align-items: center;
    padding: 4px 12px;
    gap: 16px;
    z-index: 10;
    border-bottom: 2px solid #fcbc18;
  }
  .hud8-section {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .hud8-label {
    font-size: 8px;
    color: #fcbc18;
    letter-spacing: 1px;
  }
  .bar8-bg {
    height: 8px;
    background: #383838;
    border: 1px solid #585858;
  }
  .ebar8 { width: 160px; }
  .cbar8 { width: 140px; }
  .bar8-fill {
    height: 100%;
  }
  .bar8-energy {
    width: 72%;
    background: #00e800;
  }
  .bar8-carbs {
    width: 45%;
    background: #fcbc18;
  }
  .fibre8 {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .fibre8-label {
    font-size: 7px;
    color: #00e800;
  }
  .fibre8-dot {
    width: 6px;
    height: 6px;
  }
  .fibre8-dot.on { background: #00e800; }
  .fibre8-dot.off { background: #383838; border: 1px solid #585858; }

  .ecoin-counter {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .ecoin-icon {
    width: 8px;
    height: 8px;
    background: #00e800;
    border: 1px solid #008800;
  }
  .ecoin-num {
    font-size: 12px;
    color: #00e800;
    font-weight: bold;
  }
  .stars8 {
    display: flex;
    gap: 2px;
  }
  .s8 {
    font-size: 10px;
  }
  .s8.on { color: #fcbc18; }
  .s8.off { color: #383838; }
  .level8 {
    position: absolute;
    top: 6px;
    right: 12px;
    font-size: 8px;
    color: #fcbc18;
    letter-spacing: 1px;
  }

  /* Decorative pipe */
  .pipe {
    position: absolute;
    bottom: 64px;
  }
  .pipe-top {
    width: 32px;
    height: 12px;
    background: #00a800;
    border: 2px solid #005800;
  }
  .pipe-body {
    width: 24px;
    height: 32px;
    background: #00a800;
    border-left: 2px solid #005800;
    border-right: 2px solid #005800;
    margin: 0 auto;
  }
</style>
